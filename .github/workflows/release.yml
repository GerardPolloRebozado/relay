name: Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos
            os: macos-latest
            target: x86_64-apple-darwin
          - platform: android
            os: ubuntu-latest
            target: aarch64-linux-android
          - platform: android
            os: ubuntu-latest
            target: x86_64-linux-android

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          sed "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            libxdo-dev \
            libdbus-1-dev \
            libsoup-3.0-dev \
            pkg-config \
            clang \
            libclang-dev \
            cmake \
            ninja-build

      - name: Install Android Dependencies
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli

      - name: Build Desktop
        if: matrix.platform != 'android'
        run: dx bundle --platform desktop --release

      - name: Build Android
        if: matrix.platform == 'android'
        run: dx bundle --platform android --release --target ${{ matrix.target }}

      - name: Decode Keystore
        if: matrix.platform == 'android'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Sign APK
        if: matrix.platform == 'android'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -n 1)
          echo "Using apksigner: $APKSIGNER"
          search_dirs=()
          [ -d target/dx/Relay/release ] && search_dirs+=("target/dx/Relay/release")
          [ -d target/dx/Relay/bundle ] && search_dirs+=("target/dx/Relay/bundle")
          if [ ${#search_dirs[@]} -gt 0 ]; then
            find "${search_dirs[@]}" -name "*.apk" | while read apk; do
              echo "Signing $apk..."
              $APKSIGNER sign --ks release.keystore \
                --ks-key-alias "$KEY_ALIAS" \
                --ks-pass pass:"$KEYSTORE_PASSWORD" \
                --key-pass pass:"$KEY_PASSWORD" \
                --out "${apk%.apk}-signed.apk" "$apk"
              mv "${apk%.apk}-signed.apk" "$apk"
            done
          fi
          rm release.keystore

      - name: Prepare Assets
        shell: bash
        run: |
          mkdir -p release_assets
          
          # Rename and copy files under release/bundle directories to release_assets
          search_dirs=()
          [ -d target/dx/Relay/release ] && search_dirs+=("target/dx/Relay/release")
          [ -d target/dx/Relay/bundle ] && search_dirs+=("target/dx/Relay/bundle")
          
          if [ ${#search_dirs[@]} -gt 0 ]; then
            find "${search_dirs[@]}" -type f | while read file; do
              ext="${file##*.}"
              ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
              case "$ext_lower" in
                msi|exe|deb|appimage|dmg|aab)
                  cp "$file" "release_assets/relay.$ext"
                  ;;
                apk)
                  cp "$file" "release_assets/relay-${{ matrix.target }}.apk"
                  ;;
              esac
            done

            # Package macOS app directory
            find "${search_dirs[@]}" -name "*.app" -type d | while read app; do
              zip -r "release_assets/relay.app.zip" "$app"
            done
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
