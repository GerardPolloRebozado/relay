name: Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos
            os: macos-latest
            target: x86_64-apple-darwin
          - platform: android
            os: ubuntu-latest
            target: aarch64-linux-android

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          echo "Setting version to $VERSION"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            pkg-config \
            clang \
            libclang-dev \
            cmake \
            ninja-build

      - name: Install Android Dependencies
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli

      - name: Build Desktop
        if: matrix.platform != 'android'
        run: dx bundle --platform desktop --release

      - name: Build Android
        if: matrix.platform == 'android'
        run: dx bundle --platform android --release

      - name: Prepare Assets
        shell: bash
        run: |
          mkdir -p release_assets
          find target/dx/Relay/release -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.deb" -o -name "*.appimage" -o -name "*.dmg" -o -name "*.apk" -o -name "*.aab" \) -exec cp {} release_assets/ \;

          find target/dx/Relay/release -name "*.app" -type d | while read app; do
            zip -r "release_assets/$(basename "$app").zip" "$app"
          done

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
